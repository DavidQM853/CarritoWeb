<ion-content class="login-content" [fullscreen]="true">
  <div class="login-wrapper">

    <!-- Partículas de fondo decorativas -->
    <div class="particles">
      <div class="particle" *ngFor="let p of [1,2,3,4,5,6,7,8]"></div>
    </div>

    <!-- Card principal -->
    <div class="login-card">

      <!-- Header con logo -->
      <div class="card-header">
        <div class="logo-container">
          <div class="logo-ring">
            <div class="logo-inner">
              <ion-icon name="hardware-chip-outline"></ion-icon>
            </div>
          </div>
        </div>
        <h1 class="app-title">Arduino <span class="title-accent">IA</span></h1>
        <p class="app-subtitle">Panel de Control Inteligente</p>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="onSubmit()" class="login-form">

        <!-- Error message -->
        <div class="error-banner" *ngIf="error">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ error }}</span>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="login-email" class="input-label">Correo electrónico</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input
              id="login-email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="tu@correo.com"
              autocomplete="email"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="login-password" class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              id="login-password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              [disabled]="loading"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent" class="btn-spinner"></ion-spinner>
          <ion-icon *ngIf="!loading" name="log-in-outline" class="btn-icon"></ion-icon>
          <span>{{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}</span>
        </button>

        <!-- Registro Link -->
        <div class="register-link-container">
          <span>¿No tienes una cuenta?</span>
          <a (click)="goToRegister()" class="register-link">Regístrate aquí</a>
        </div>

      </form>

      <!-- Footer -->
      <div class="card-footer">
        <p>Sistema de monitoreo y control autónomo</p>
      </div>

    </div>

  </div>
</ion-content>
