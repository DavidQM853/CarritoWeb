<ion-content class="register-content" [fullscreen]="true">
  <div class="register-wrapper">

    <!-- Partículas de fondo -->
    <div class="particles">
      <div class="particle" *ngFor="let p of [1,2,3,4,5,6,7,8]"></div>
    </div>

    <!-- Card principal -->
    <div class="register-card">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-container">
          <div class="logo-ring">
            <div class="logo-inner">
              <ion-icon name="hardware-chip-outline"></ion-icon>
            </div>
          </div>
        </div>
        <h1 class="app-title">Crear <span class="title-accent">Cuenta</span></h1>
        <p class="app-subtitle">Regístrate para acceder al panel</p>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="onSubmit()" class="register-form">

        <!-- Mensaje de éxito -->
        <div class="success-banner" *ngIf="success">
          <ion-icon name="checkmark-circle-outline"></ion-icon>
          <span>{{ success }}</span>
        </div>

        <!-- Mensaje de error -->
        <div class="error-banner" *ngIf="error">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ error }}</span>
        </div>

        <!-- Nombre -->
        <div class="input-group">
          <label for="reg-nombre" class="input-label">Nombre completo</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon>
            <input
              id="reg-nombre"
              type="text"
              [(ngModel)]="nombre"
              name="nombre"
              placeholder="Tu nombre"
              autocomplete="name"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="reg-email" class="input-label">Correo electrónico</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input
              id="reg-email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="tu@correo.com"
              autocomplete="email"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="reg-password" class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              id="reg-password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              [disabled]="loading"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Confirmar Password -->
        <div class="input-group">
          <label for="reg-confirm" class="input-label">Confirmar contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              id="reg-confirm"
              [type]="showConfirm ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Repite tu contraseña"
              autocomplete="new-password"
              [disabled]="loading"
            />
            <button type="button" class="toggle-password" (click)="toggleConfirm()" tabindex="-1">
              <ion-icon [name]="showConfirm ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-register" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent" class="btn-spinner"></ion-spinner>
          <ion-icon *ngIf="!loading" name="person-add-outline" class="btn-icon"></ion-icon>
          <span>{{ loading ? 'Creando cuenta...' : 'Crear Cuenta' }}</span>
        </button>

      </form>

      <!-- Footer con link a login -->
      <div class="card-footer">
        <p>¿Ya tienes una cuenta? <a (click)="goToLogin()" class="footer-link">Iniciar Sesión</a></p>
      </div>

    </div>

  </div>
</ion-content>
